# render.yaml
# Blueprint for Render Deployment

databases:
  - name: pkms-db
    databaseName: pkms
    user: pkms_user
    plan: free

services:
  - type: web
    name: pkms-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pkms-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      # We will need to update this with the actual Vercel URL once deployed
      - key: FRONTEND_URL
        value: "https://your-vercel-app-url.vercel.app"
      # Requires manual entry in the Render Dashboard after deployment
      - key: GEMINI_API_KEY
        sync: false
      # Automatically generates secure random strings for your JWT tokens
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
